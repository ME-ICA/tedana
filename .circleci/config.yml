# Python CircleCI 2.1 configuration file
#
# Check https://circleci.com/docs/2.0/language-python/ for more details
#
version: 2.1
orbs:
  codecov: codecov/codecov@5.2.1
jobs:
  style_check:
    docker:
      - image: cimg/python:3.13
    working_directory: /tmp/src/tedana
    steps:
      - checkout
      - restore_cache:
          keys:
            - tox-lint-v1-{{ checksum "uv.lock" }}
            - tox-lint-v1-
      - run:
          name: Style check
          command: |
            uvx tox -e lint
      - save_cache:
          key: tox-lint-v1-{{ checksum "uv.lock" }}
          paths:
            - .tox

  three-echo:
    docker:
      - image: cimg/python:3.9
    working_directory: /tmp/src/tedana
    steps:
      - checkout
      - restore_cache:
          keys:
            - tox-py39-three-echo-v1-{{ checksum "uv.lock" }}
            - tox-py39-three-echo-v1-
      - run:
          name: Running integration tests
          command: |
            uvx tox -e three-echo
            mkdir /tmp/src/coverage
            mv .coverage /tmp/src/coverage/.coverage.three-echo
      - save_cache:
          key: tox-py39-three-echo-v1-{{ checksum "uv.lock" }}
          paths:
            - .tox
      - persist_to_workspace:
          root: /tmp
          paths:
            - src/coverage/.coverage.three-echo
      - run:
          name: Remove NIfTI files to reduce artifact size
          command: find /tmp/src/tedana/.testing_data_cache/outputs -name "*.nii*" -delete || true
      - store_artifacts:
          path: /tmp/src/tedana/.testing_data_cache/outputs/three-echo
          destination: three-echo-outputs

  four-echo:
    docker:
      - image: cimg/python:3.9
    working_directory: /tmp/src/tedana
    steps:
      - checkout
      - restore_cache:
          keys:
            - tox-py39-four-echo-v1-{{ checksum "uv.lock" }}
            - tox-py39-four-echo-v1-
      - run:
          name: Running integration tests
          command: |
            uvx tox -e four-echo
            mkdir /tmp/src/coverage
            mv .coverage /tmp/src/coverage/.coverage.four-echo
      - save_cache:
          key: tox-py39-four-echo-v1-{{ checksum "uv.lock" }}
          paths:
            - .tox
      - persist_to_workspace:
          root: /tmp
          paths:
            - src/coverage/.coverage.four-echo
      - run:
          name: Remove NIfTI files to reduce artifact size
          command: find /tmp/src/tedana/.testing_data_cache/outputs -name "*.nii*" -delete || true
      - store_artifacts:
          path: /tmp/src/tedana/.testing_data_cache/outputs/four-echo
          destination: four-echo-outputs

  five-echo:
    docker:
      - image: cimg/python:3.9
    working_directory: /tmp/src/tedana
    steps:
      - checkout
      - restore_cache:
          keys:
            - tox-py39-five-echo-v1-{{ checksum "uv.lock" }}
            - tox-py39-five-echo-v1-
      - run:
          name: Running integration tests
          command: |
            uvx tox -e five-echo
            mkdir /tmp/src/coverage
            mv .coverage /tmp/src/coverage/.coverage.five-echo
      - save_cache:
          key: tox-py39-five-echo-v1-{{ checksum "uv.lock" }}
          paths:
            - .tox
      - persist_to_workspace:
          root: /tmp
          paths:
            - src/coverage/.coverage.five-echo
      - run:
          name: Remove NIfTI files to reduce artifact size
          command: find /tmp/src/tedana/.testing_data_cache/outputs -name "*.nii*" -delete || true
      - store_artifacts:
          path: /tmp/src/tedana/.testing_data_cache/outputs/five-echo
          destination: five-echo-outputs

  reclassify:
    docker:
      - image: cimg/python:3.9
    working_directory: /tmp/src/tedana
    steps:
      - checkout
      - restore_cache:
          keys:
            - tox-py39-reclassify-v1-{{ checksum "uv.lock" }}
            - tox-py39-reclassify-v1-
      - run:
          name: Running integration tests
          command: |
            uvx tox -e reclassify
            mkdir /tmp/src/coverage
            mv .coverage /tmp/src/coverage/.coverage.reclassify
      - save_cache:
          key: tox-py39-reclassify-v1-{{ checksum "uv.lock" }}
          paths:
            - .tox
      - persist_to_workspace:
          root: /tmp
          paths:
            - src/coverage/.coverage.reclassify
      - run:
          name: Remove NIfTI files to reduce artifact size
          command: find /tmp/src/tedana/.testing_data_cache/outputs -name "*.nii*" -delete || true
      - store_artifacts:
          path: /tmp/src/tedana/.testing_data_cache/outputs/reclassify
          destination: reclassify-outputs

  t2smap:
    docker:
      - image: cimg/python:3.9
    working_directory: /tmp/src/tedana
    steps:
      - checkout
      - restore_cache:
          keys:
            - tox-py39-t2smap-v1-{{ checksum "uv.lock" }}
            - tox-py39-t2smap-v1-
      - run:
          name: Running integration tests
          command: |
            uvx tox -e t2smap
            mkdir /tmp/src/coverage
            mv .coverage /tmp/src/coverage/.coverage.t2smap
      - save_cache:
          key: tox-py39-t2smap-v1-{{ checksum "uv.lock" }}
          paths:
            - .tox
      - persist_to_workspace:
          root: /tmp
          paths:
            - src/coverage/.coverage.t2smap
      - run:
          name: Remove NIfTI files to reduce artifact size
          command: find /tmp/src/tedana/.testing_data_cache/outputs -name "*.nii*" -delete || true
      - store_artifacts:
          path: /tmp/src/tedana/.testing_data_cache/outputs/t2smap_five-echo
          destination: t2smap-outputs

  merge_coverage:
    working_directory: /tmp/src/tedana
    docker:
      - image: cimg/python:3.13
    steps:
      - attach_workspace:
          at: /tmp
      - checkout
      - run:
          name: Merge coverage files
          command: |
            cd /tmp/src/coverage/
            uvx coverage combine
            uvx coverage xml
            mv coverage.xml /tmp/src/tedana/
      - store_artifacts:
          path: /tmp/src/coverage
      - codecov/upload

workflows:
  upload-to-codecov:
    jobs:
      - style_check
      - three-echo
      - four-echo
      - five-echo
      - reclassify
      - t2smap
      - merge_coverage:
          requires:
            - three-echo
            - four-echo
            - five-echo
            - reclassify
            - t2smap
